# GitLab CI pipeline driving ledo. Copy to .gitlab-ci.yml and adapt.
# CI/CD variables to set: REGISTRY_USERNAME, REGISTRY_PASSWORD.
# Uses a docker-in-docker service so ledo can talk to a Docker daemon.
stages:
  - test
  - release

variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

.ledo:
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - apk add --no-cache curl bash
    - curl -sL https://raw.githubusercontent.com/paramah/ledo/master/install.sh | sh

test:
  extends: .ledo
  stage: test
  script:
    - ledo mode select test
    - ledo container uponce

release:
  extends: .ledo
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    # ledo only logs in for AWS ECR (`ledo container login ecr`); for every other registry
    # log in with plain docker login <registry>. Swap for `ledo container login ecr -r ... -k ... -s ...` on ECR.
    - echo "$REGISTRY_PASSWORD" | docker login "$(ledo image fqn | cut -d/ -f1)" -u "$REGISTRY_USERNAME" --password-stdin
    - VERSION="${CI_COMMIT_TAG#v}"
    - ledo image build "$VERSION"
    - ledo image push "$VERSION"
