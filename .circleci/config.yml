# .circleci/config.yml
version: 2.1
workflows:
  main:
    jobs:
      - release:
          # Only run this job on git tag pushes
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-.*)*/
jobs:
  release:
    docker:
      - image: cimg/go:1.24.5
    steps:
      - checkout
      - run:
          name: goreleaser
          # git.io was shut down (Apr 2022); use GoReleaser's official run script.
          command: curl -sfL https://goreleaser.com/static/run | bash -s -- release --clean
